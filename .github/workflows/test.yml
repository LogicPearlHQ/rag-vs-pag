name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      # Tests that hit the fetched corpus (pearl build tests, case-grounding
      # tests) need `make fetch` first. Tests marked `live` are skipped by
      # default (no API key required on CI).
      - name: Run non-live tests (no corpus, no API)
        run: uv run pytest -q -m 'not live' --ignore=tests/test_pearl_build.py --ignore=tests/test_cases_grounded.py --ignore=tests/test_chunking_other.py --ignore=tests/test_traces_generation.py
