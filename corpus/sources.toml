# Shared corpus for both sides of the demo.
#
# All entries are fetched by corpus/fetch.py into corpus/raw/<id>.bin and
# verified against sha256. Values of "TBD" are skipped on first fetch;
# fetch.py writes the observed sha256 into corpus/raw/MANIFEST.json so the
# operator can paste the pinned hashes back into this file.
#
# If a URL fails at fetch time and a corpus/snapshot/<id>.txt fallback
# exists, fetch.py uses it. Otherwise the doc is skipped and the demo
# continues with the remaining corpus.
#
# Licensing:
#   - Federal works (statute, CFR, DOJ Guide) are public domain.
#   - CourtListener opinions are public-domain court text redistributed
#     under CourtListener's terms. See ATTRIBUTIONS.md.

# ----- Statute ---------------------------------------------------------------

