# ----- Selected FOIA case opinions ------------------------------------------
# CourtListener's REST API now requires authentication (401 without a token).
# The landmark opinions below are public-domain court text; to enable this
# part of the corpus, register at https://www.courtlistener.com and put
# `COURTLISTENER_TOKEN=...` in .env, then add back entries like:
#
#   [[documents]]
#   id = "nlrb_v_sears_roebuck"
#   kind = "case"
#   url = "https://www.courtlistener.com/api/rest/v4/clusters/108967/"
#   sha256 = "TBD"
#   cite_root = "NLRB v. Sears, Roebuck & Co., 421 U.S. 132 (1975)"
#
# Relevant landmark cases (omitted from the auto-fetched corpus until an
# API token is available):
#   - NLRB v. Sears, Roebuck & Co., 421 U.S. 132 (1975)       [b5]
#   - Dep't of State v. Ray, 502 U.S. 164 (1991)              [b6]
#   - DOJ v. Reporters Committee, 489 U.S. 749 (1989)         [b7(C)]
#   - FBI v. Abramson, 456 U.S. 615 (1982)                    [b7]
#   - Dep't of the Interior v. Klamath, 532 U.S. 1 (2001)     [b5]
#
# The demo remains fully functional on the statute + DOJ Guide + CFR
# corpus; cases are optional depth.
